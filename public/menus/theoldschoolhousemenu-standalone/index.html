<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Old School House - Elegant Four Page Menu</title>
    <link rel="icon" href="data:,">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
      href="https://fonts.googleapis.com/css2?family=Source+Sans+3:ital,wght@0,400;0,600;0,700;1,400&family=Source+Serif+4:ital,wght@0,600;0,700;1,600&display=swap"
      rel="stylesheet"
    >
    <style>
      @page {
        size: A4 portrait;
        margin: 0;
      }

      :root {
        --paper: #f7f3eb;
        --paper-shadow: #e4dbcf;
        --ink: #2b241d;
        --ink-soft: rgba(43, 36, 29, 0.72);
        --ink-faint: rgba(43, 36, 29, 0.54);
        --gold: #b98132;
        --gold-soft: rgba(185, 129, 50, 0.08);
        --gold-deep: #96492b;
        --pine: #1f3127;
        --pine-soft: rgba(31, 49, 39, 0.16);
        --mild: #c7903e;
        --medium: #b85e36;
        --hot: #8f3528;
        --veg: #617246;
        --gf: #8b6038;
        --sheet-width: 210mm;
        --sheet-height: 297mm;
        --content-font-bump: 0.53mm;
        /* 🛠️ MASTER SPACING CONTROLS */
        --menu-stack-gap: 8mm;
        --menu-stack-pad-top: 8mm;
        --menu-stack-pad-bottom: 12mm;
        --sheet-frame-pad: 4mm;
        --sheet-border-pad: 1.5mm;
        --sheet-panel-pad: 6mm;
        --section-gap: 2.55mm;
        --section-rule-margin-top: 0.9mm;
        --section-title-size: 4.78mm;
        --section-subtitle-size: 2.48mm;
        --panel-title-size: calc(3.15mm + var(--content-font-bump));
        --subheader-gap: 2.2mm;
        --subheader-pad-bottom: 1mm;
        --grid-gap-x: 8mm;
        --grid-gap-x-tight: 6mm;
        --grid-gap-x-compact: 5mm;
        --grid-gap-y: 3.6mm;
        --item-gap-y: 0.36mm;
        --item-pad-y: 0.92mm;
        --item-pad-y-compact: 0.68mm;
        --item-head-gap: 4mm;
        --item-meta-gap: 1mm;
        --item-meta-margin-top: 0.55mm;
        --menu-title-size: 3.60mm;
        --menu-price-size: 3.30mm;
        --menu-desc-size: 3.10mm;
        --price-col-width: 20mm;
        --star-inset-x: 2mm;
        --label-gap: 1.6mm;
        --badge-pad-y: 0.55mm;
        --badge-pad-x: 1.4mm;
        --chip-pad-y: 0.45mm;
        --chip-pad-x: 0.9mm;
        --cover-top-pad-top: 5.2mm;
        --cover-top-pad-bottom: 6mm;
        --cover-middle-gap: 2.7mm;
        --cover-middle-inline-pad: 10mm;
        --cover-footer-gap-x: 8mm;
        --cover-footer-pad-top: 4.3mm;
        --hours-card-pad: 8mm;
        --hours-title-gap: 6mm;
        --hours-grid-gap-x: 10mm;
        --card-pad: 3.65mm;
        --card-pad-tight: 2.85mm;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        padding: 0;
      }

      body {
        background: linear-gradient(180deg, #e6ddd1 0%, #d8cfbf 100%);
        color: var(--ink);
        font-family: "Source Sans 3", sans-serif;
      }

      .menu-system {
        min-height: 100vh;
        padding: var(--menu-stack-pad-top) 0 var(--menu-stack-pad-bottom);
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: var(--menu-stack-gap);
      }

      .print-button {
        position: fixed;
        right: 24px;
        bottom: 24px;
        z-index: 50;
        display: inline-flex;
        align-items: center;
        gap: 10px;
        border: 0;
        border-radius: 999px;
        background: var(--gold-deep);
        color: #fff;
        cursor: pointer;
        padding: 14px 18px;
        box-shadow: 0 18px 34px rgba(44, 36, 27, 0.25);
        text-transform: uppercase;
        letter-spacing: 0.18em;
        font-size: 11px;
        font-weight: 700;
      }

      .print-button:hover {
        background: #7a2e18;
      }

      .sheet {
        width: var(--sheet-width);
        height: var(--sheet-height);
        background: var(--paper);
        position: relative;
        overflow: hidden;
        box-shadow: 0 10mm 22mm rgba(44, 36, 27, 0.18);
        print-color-adjust: exact;
        -webkit-print-color-adjust: exact;
      }

      .sheet::before {
        content: "";
        position: absolute;
        inset: 0;
        pointer-events: none;
        opacity: 0.12;
        background:
          radial-gradient(circle at top, rgba(255, 255, 255, 0.85), transparent 34%),
          radial-gradient(circle at bottom right, rgba(200, 125, 38, 0.08), transparent 32%);
      }

      .sheet-frame {
        width: 100%;
        height: 100%;
        padding: var(--sheet-frame-pad);
      }

      .sheet-border {
        width: 100%;
        height: 100%;
        border: 1.5px solid var(--ink);
        padding: var(--sheet-border-pad);
        background: var(--paper);
      }

      .sheet-panel {
        width: 100%;
        height: 100%;
        border: 0.5px solid var(--ink);
        padding: var(--sheet-panel-pad);
        display: flex;
        flex-direction: column;
        background: var(--paper);
        position: relative;
      }

      .page {
        width: 100%;
        height: 100%;
        display: flex;
        flex-direction: column;
      }

      .font-serif {
        font-family: "Source Serif 4", serif;
      }

      .centered {
        text-align: center;
      }

      .section-header {
        text-align: center;
        margin-bottom: var(--section-gap);
      }

      .section-title {
        font-family: "Source Serif 4", serif;
        font-size: var(--section-title-size);
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.15em;
        color: var(--gold-deep);
        margin: 0;
      }

      .section-header.dark .section-title {
        color: #ffffff;
      }

      .section-subtitle {
        font-size: var(--section-subtitle-size);
        text-transform: uppercase;
        letter-spacing: 0.2em;
        color: rgba(200, 125, 38, 0.92);
        margin-top: 1mm;
      }

      .section-header.dark .section-subtitle {
        color: rgba(217, 139, 44, 0.92);
      }

      .section-rule {
        display: block;
        width: 18mm;
        height: 0.5mm;
        margin-top: var(--section-rule-margin-top);
        margin-left: auto;
        margin-right: auto;
        background: linear-gradient(90deg, transparent, rgba(185, 129, 50, 0.7), transparent);
      }

      .section-rule-line {
        display: none;
      }

      .section-header.dark .section-rule-line {
        display: none;
      }

      .section-rule-diamond {
        display: none;
      }

      .section-header.dark .section-rule-diamond {
        display: none;
      }

      .subheader {
        margin: 0 0 var(--subheader-gap);
        padding-bottom: var(--subheader-pad-bottom);
        border-bottom: 1px solid rgba(44, 36, 27, 0.16);
        font-size: var(--panel-title-size);
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.15em;
        color: var(--gold-deep);
      }

      .two-col {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 0 var(--grid-gap-x);
      }

      .three-col {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 0 var(--grid-gap-x-tight);
      }

      .four-col {
        display: grid;
        grid-template-columns: repeat(4, minmax(0, 1fr));
        gap: 0 var(--grid-gap-x-compact);
      }

      .menu-list {
        display: flex;
        flex-direction: column;
      }

      .menu-item {
        position: relative;
        display: grid;
        grid-template-columns: minmax(0, 1fr) var(--price-col-width);
        column-gap: var(--item-head-gap);
        gap: var(--item-gap-y);
        padding: var(--item-pad-y) 0;
        border-bottom: 1px solid rgba(44, 36, 27, 0.1);
        align-items: start;
      }

      .menu-item.compact {
        padding: var(--item-pad-y-compact) 0;
      }

      .menu-item:last-child {
        border-bottom: 0;
      }

      .menu-item.starred {
        margin: 0;
        padding-left: calc(var(--star-inset-x) + 1.1mm);
        padding-right: 0;
        background: rgba(200, 125, 38, 0.05);
        border-radius: 2px;
      }

      .menu-item.dark.starred {
        background: rgba(255, 255, 255, 0.06);
      }

      .menu-item.starred::before {
        content: "";
        position: absolute;
        left: 0.35mm;
        top: 10%;
        bottom: 10%;
        width: 2.5px;
        border-radius: 0 2px 2px 0;
        background: var(--gold);
      }

      .menu-item.dark.starred::before {
        background: var(--mild);
      }

      .menu-item-head {
        display: contents;
      }

      .menu-item-name {
        min-width: 0;
      }

      .menu-item-title-row {
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        gap: 0.8mm 0;
        min-width: 0;
      }

      .menu-item-title {
        font-family: "Source Serif 4", serif;
        font-size: var(--menu-title-size);
        font-weight: 600;
        line-height: 1.06;
        text-transform: uppercase;
        color: var(--ink);
        overflow-wrap: anywhere;
      }

      .menu-item.compact .menu-item-title {
        font-size: var(--menu-title-size);
      }

      .menu-item.starred .menu-item-title {
        font-size: calc(var(--menu-title-size) * 1.05);
      }

      .menu-item.compact.starred .menu-item-title {
        font-size: calc(var(--menu-title-size) * 1.05);
      }

      .menu-item.dark .menu-item-title {
        color: #faf6f0;
      }

      .menu-item-price {
        grid-column: 2;
        justify-self: end;
        width: var(--price-col-width);
        text-align: right;
        padding-top: 0.12mm;
        font-size: var(--menu-price-size);
        line-height: 1.02;
        letter-spacing: 0.03em;
        color: #a45432;
        white-space: nowrap;
      }

      .menu-item.compact .menu-item-price {
        font-size: var(--menu-price-size);
      }

      .menu-item.dark .menu-item-price {
        color: var(--mild);
      }

      .menu-item-desc {
        grid-column: 1;
        margin-top: 0.22mm;
        font-size: var(--menu-desc-size);
        font-style: italic;
        line-height: 1.16;
        color: rgba(44, 36, 27, 0.62);
        overflow-wrap: anywhere;
      }

      .menu-item.compact .menu-item-desc {
        margin-top: 0.2mm;
        font-size: var(--menu-desc-size);
        line-height: 1.14;
      }

      .menu-item.dark .menu-item-desc {
        color: rgba(250, 246, 240, 0.72);
      }

      .label-group {
        display: inline-flex;
        flex-wrap: wrap;
        align-items: center;
        gap: 2px;
        margin-left: var(--label-gap);
        min-width: 0;
      }

      .badge {
        display: inline-flex;
        align-items: center;
        margin-left: var(--label-gap);
        padding: var(--badge-pad-y) var(--badge-pad-x);
        border-radius: 2px;
        font-size: calc(1.8mm + var(--content-font-bump));
        line-height: 1;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.1em;
        box-shadow: 0 1px 4px rgba(44, 36, 27, 0.12);
      }

      .badge.gold {
        background: var(--gold);
        color: #ffffff;
      }

      .badge.dark {
        background: var(--ink);
        color: #ffffff;
      }

      .dark-context .badge.dark {
        background: #faf6f0;
        color: var(--ink);
      }

      .icon-inline {
        display: inline-flex;
        align-items: center;
        justify-content: center;
      }

      .icon-leaf svg {
        color: var(--veg);
      }

      .icon-flame.mild svg {
        color: var(--mild);
      }

      .icon-flame.medium svg {
        color: var(--medium);
      }

      .icon-flame.hot svg {
        color: var(--hot);
      }

      .icon-flame-stack {
        display: inline-flex;
      }

      .icon-flame-stack .icon-inline + .icon-inline {
        margin-left: -5px;
      }

      .label-chip {
        display: inline-flex;
        align-items: center;
        border: 1px solid rgba(140, 70, 39, 0.3);
        color: var(--gf);
        font-size: calc(1.8mm + var(--content-font-bump));
        line-height: 1;
        font-weight: 700;
        letter-spacing: 0.08em;
        padding: var(--chip-pad-y) var(--chip-pad-x);
        border-radius: 2px;
      }

      .label-chip.dry {
        border-color: rgba(44, 36, 27, 0.3);
        color: rgba(44, 36, 27, 0.7);
      }

      .cover-page {
        display: flex;
        flex-direction: column;
        justify-content: center;
        position: relative;
        min-height: 100%;
        padding-top: var(--cover-top-pad-top);
        padding-bottom: calc(var(--cover-top-pad-bottom) + 12mm);
        padding-left: 5.4mm;
        padding-right: 5.4mm;
      }

      .cover-core {
        display: flex;
        flex-direction: column;
        gap: 2.8mm;
      }

      .cover-support {
        display: flex;
        flex-direction: column;
        gap: 2mm;
        margin-top: 3mm;
      }

      .cover-hero {
        position: relative;
        display: grid;
        grid-template-columns: 25mm minmax(0, 1fr);
        gap: 5mm;
        align-items: center;
        padding: 4.6mm 5.2mm 4.2mm;
        border: 1px solid rgba(44, 36, 27, 0.15);
        background:
          linear-gradient(180deg, rgba(255, 255, 255, 0.96) 0%, rgba(247, 243, 235, 0.9) 100%);
        box-shadow: 0 10px 24px rgba(44, 36, 27, 0.08);
      }

      .cover-hero::before {
        content: "";
        position: absolute;
        inset: 3px;
        border: 1px solid rgba(185, 129, 50, 0.22);
        pointer-events: none;
      }

      .cover-logo-badge {
        width: 25mm;
        height: 25mm;
        border-radius: 999px;
        background: radial-gradient(circle at 30% 30%, rgba(255, 255, 255, 0.9), rgba(247, 243, 235, 0.55));
        border: 1px solid rgba(44, 36, 27, 0.15);
        display: flex;
        align-items: center;
        justify-content: center;
        box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.8);
      }

      .cover-logo {
        width: 18.5mm;
        height: auto;
        object-fit: contain;
        margin: 0;
      }

      .cover-hero-copy {
        min-width: 0;
      }

      .cover-kicker {
        font-size: calc(1.95mm + var(--content-font-bump));
        line-height: 1.1;
        font-weight: 700;
        letter-spacing: 0.24em;
        text-transform: uppercase;
        color: var(--gold-deep);
      }

      .cover-name {
        margin: 1.4mm 0 1.8mm;
        font-family: "Source Serif 4", serif;
        font-size: calc(12.4mm + var(--content-font-bump));
        line-height: 0.9;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }

      .cover-subtitle {
        font-size: calc(2.9mm + var(--content-font-bump));
        font-weight: 700;
        letter-spacing: 0.28em;
        text-transform: uppercase;
        color: var(--gold);
      }

      .cover-social {
        margin-top: 1.6mm;
        font-size: calc(2.1mm + var(--content-font-bump));
        font-weight: 600;
        letter-spacing: 0.18em;
        text-transform: uppercase;
        color: rgba(44, 36, 27, 0.58);
      }

      .cover-intro-band {
        display: grid;
        grid-template-columns: minmax(0, 1fr) 42mm;
        gap: 4.2mm;
        align-items: stretch;
      }

      .cover-intro {
        padding: 4.2mm 4.8mm 4.1mm;
        background: rgba(255, 255, 255, 0.8);
        border-left: 1.6mm solid rgba(150, 73, 43, 0.9);
        box-shadow: 0 8px 20px rgba(44, 36, 27, 0.06);
      }

      .cover-intro-kicker {
        font-size: calc(1.85mm + var(--content-font-bump));
        line-height: 1.1;
        font-weight: 700;
        letter-spacing: 0.2em;
        text-transform: uppercase;
        color: var(--gold-deep);
      }

      .cover-intro-title {
        margin: 1.6mm 0 1.8mm;
        font-family: "Source Serif 4", serif;
        font-size: calc(5.2mm + var(--content-font-bump));
        line-height: 1.05;
        letter-spacing: 0.01em;
        color: var(--ink);
      }

      .cover-intro-body {
        font-size: calc(2.55mm + var(--content-font-bump));
        line-height: 1.42;
        color: rgba(44, 36, 27, 0.72);
      }

      .cover-side-stack {
        display: grid;
        grid-template-rows: auto auto;
        gap: 3.1mm;
      }

      .cover-qr-card,
      .cover-mini-card,
      .hours-card {
        background: #ffffff;
        border: 1px solid rgba(44, 36, 27, 0.14);
        box-shadow: 0 8px 18px rgba(44, 36, 27, 0.08);
      }

      .cover-qr-card {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 1mm;
        padding: 2.4mm 2.2mm;
        text-align: center;
        text-decoration: none;
      }

      .cover-qr-image {
        width: 20mm;
        height: 20mm;
        object-fit: contain;
        display: block;
      }

      .cover-qr-kicker {
        font-size: calc(1.85mm + var(--content-font-bump));
        line-height: 1.1;
        font-weight: 700;
        letter-spacing: 0.18em;
        text-transform: uppercase;
        color: var(--gold-deep);
      }

      .cover-qr-note {
        font-size: calc(1.9mm + var(--content-font-bump));
        line-height: 1.18;
        color: rgba(44, 36, 27, 0.64);
      }

      .cover-qr-url {
        font-size: calc(1.8mm + var(--content-font-bump));
        line-height: 1.1;
        font-weight: 700;
        letter-spacing: 0.08em;
        color: var(--gold);
      }

      .cover-mini-card {
        padding: 2.8mm 3.1mm;
      }

      .cover-mini-title {
        font-size: calc(1.85mm + var(--content-font-bump));
        line-height: 1.1;
        font-weight: 700;
        letter-spacing: 0.18em;
        text-transform: uppercase;
        color: var(--gold-deep);
      }

      .cover-mini-body {
        margin-top: 1.2mm;
        font-size: calc(2.2mm + var(--content-font-bump));
        line-height: 1.34;
        color: rgba(44, 36, 27, 0.66);
      }

      .cover-contact-list {
        display: grid;
        gap: 1.15mm;
        margin-top: 1.2mm;
      }

      .cover-contact-line {
        display: grid;
        gap: 0.35mm;
      }

      .cover-contact-label {
        font-size: calc(1.55mm + var(--content-font-bump));
        line-height: 1.05;
        font-weight: 700;
        letter-spacing: 0.16em;
        text-transform: uppercase;
        color: rgba(150, 73, 43, 0.78);
      }

      .cover-contact-value {
        font-size: calc(2.05mm + var(--content-font-bump));
        line-height: 1.24;
        color: rgba(44, 36, 27, 0.7);
      }

      .hours-card {
        width: 100%;
        padding: 3.4mm 4.4mm 3.2mm;
      }

      .hours-head {
        display: flex;
        justify-content: space-between;
        align-items: baseline;
        gap: 3mm;
        margin-bottom: 2.2mm;
        padding-bottom: 1.4mm;
        border-bottom: 1px solid rgba(44, 36, 27, 0.12);
      }

      .hours-title {
        margin: 0;
        font-family: "Source Serif 4", serif;
        font-size: calc(3.15mm + var(--content-font-bump));
        font-weight: 700;
        color: var(--gold-deep);
        text-transform: uppercase;
        letter-spacing: 0.16em;
      }

      .hours-subtitle {
        font-size: calc(1.7mm + var(--content-font-bump));
        line-height: 1.1;
        font-weight: 700;
        letter-spacing: 0.16em;
        text-transform: uppercase;
        color: rgba(44, 36, 27, 0.46);
      }

      .hours-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 0 5.2mm;
      }

      .hours-column-title {
        margin: 0 0 1.35mm;
        padding-bottom: 0.8mm;
        border-bottom: 1px solid rgba(44, 36, 27, 0.15);
        font-size: calc(2.05mm + var(--content-font-bump));
        font-weight: 700;
        letter-spacing: 0.16em;
        text-transform: uppercase;
      }

      .hours-list {
        list-style: none;
        padding: 0;
        margin: 0;
        display: flex;
        flex-direction: column;
        gap: 0.8mm;
      }

      .hours-list li {
        display: grid;
        grid-template-columns: 16mm 1fr;
        gap: 1.4mm;
        align-items: baseline;
      }

      .hours-day {
        display: block;
        font-size: calc(1.85mm + var(--content-font-bump));
        text-transform: uppercase;
        letter-spacing: 0.08em;
        color: rgba(44, 36, 27, 0.52);
      }

      .hours-time {
        display: block;
        font-size: calc(2.25mm + var(--content-font-bump));
        font-weight: 700;
        color: var(--gold);
      }

      .cover-footer {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 4.2mm;
      }

      .cover-note {
        padding: 3.1mm 3.5mm;
        background: rgba(255, 255, 255, 0.72);
        border: 1px solid rgba(44, 36, 27, 0.1);
      }

      .note-title {
        display: inline-flex;
        align-items: center;
        gap: 1.5mm;
        font-size: calc(2.3mm + var(--content-font-bump));
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.15em;
        color: var(--gold-deep);
        margin-bottom: 1.6mm;
      }

      .note-body {

                      ${renderContactFooter()}

                  </div>
                </div>
              </div>
            </div>

      function renderPageThree() {
        return `
          <section class="sheet">
            <div class="sheet-frame">
              <div class="sheet-border">
                <div class="sheet-panel">
                  <div class="page page-three-layout">
                    <div class="top-grid-page-three">
                      <div class="paired-matrix-row">
                        ${renderBiryaniMatrix(menuData.biryani, menuData.biryaniIntro)}

                      </div>

                      <section class="dark-card dark-context mixed-grills-card">
                        ${renderSectionHeader(
                          "Our Mixed Grills",
                          menuData.mixedGrillsIntro || "Sizzling Sharing Platters",
                          true
                        )}
                        <div class="two-col">
                          ${renderMenuList(menuData.mixedGrills.slice(0, 3), { isDark: true })}
                          ${renderMenuList(menuData.mixedGrills.slice(3), { isDark: true })}

                    ${renderCurriesMatrix(menuData.curries, menuData.curriesIntro)}

                    <section class="accompaniments">

                        </div>

                        <div class="accompaniments-grid">

                          <div class="accompaniment-stack">

                              "side"
                            )}

                        </div>
                      </div>
                    </section>

                    ${renderContactFooter()}
                  </div>
                </div>
              </div>
            </div>
          </section>
        `;
      }

      function renderPageFour() {
        return `
          <section class="sheet">
            <div class="sheet-frame">
              <div class="sheet-border">
                <div class="sheet-panel">
                  <div class="page page-four-layout">
                    <section class="plain-card pub-hero">
                      <div class="pub-hero-inner">
                        ${renderSectionHeader("Pub Favourites", "Proper pub classics & fresh wraps")}
                        <div class="two-col pub-hero-grid">
                          <div>
                            ${renderSubHeader("Pub Classics")}
                            <div class="pub-classics-list">${renderMenuList(menuData.pubClassic)}</div>
                          </div>
                          <div>
                            ${renderSubHeader("Wraps")}
                            <div class="wrap-note">${escapeHtml(menuData.pubGrubIntro || "Served with chips, salad & sweet chilli")}</div>
                            ${renderMenuList(menuData.pubGrub)}
                          </div>
                        </div>
                      </div>
                    </section>

                    <div class="chips-band">
                      <section class="band-section">
                        ${renderSectionHeader("Chips & Fries")}
                        <div class="two-col chips-band-list">
                          ${renderMenuList(menuData.chips.slice(0, 3), { compact: true })}
                          ${renderMenuList(menuData.chips.slice(3), { compact: true })}
                        </div>
                      </section>

                      <section class="band-section salad-band">
                        ${renderSectionHeader("Salad")}
                        <div class="salad-list">
                          ${renderMenuList(menuData.salad, { compact: true })}
                        </div>
                      </section>
                    </div>

                    <div class="bottom-split">
                      <section class="kids-card">
                        <div class="kids-label">Kids Plates</div>
                        <div class="kids-note">${escapeHtml(menuData.kidsIntro || "Choose chips or rice")}</div>
                        ${renderMenuList(menuData.kids, { compact: true })}
                      </section>

                      <section class="dessert-card dark-context">
                        ${renderSectionHeader("Sweet Finish", "", true)}
                        <div class="dessert-list">${renderMenuList(menuData.desserts, { compact: true, isDark: true })}</div>
                      </section>
                    </div>

                    ${(menuData.sisterPubsSpecials || []).length
                      ? `
                        <section class="sister-pubs">
                          <div class="sister-kicker">Across Our Sister Pubs</div>
                          <h2 class="sister-title">Chef's Specials Brought To Your Table</h2>
                          <div class="sister-intro">We bring our sister pubs' chef's special dishes right here to your table at The Old School House. Let us know what you're craving and we'll take care of the rest.</div>

                        </section>
                      `
                      : ""}

                    ${renderContactFooter()}
                  </div>
                </div>
              </div>
            </div>
          </section>
        `;
      }

      function renderApp() {
        document.getElementById("app").innerHTML = [
          renderCoverPage(),
          renderPageTwo(),
          renderPageThree(),
          renderPageFour()
        ].join("");
      }

      document.getElementById("print-button").addEventListener("click", () => {
        window.print();
      });

      renderApp();
    </script>
  </body>
</html>
