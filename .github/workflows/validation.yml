name: Validation

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium

      - name: Run lint
        run: pnpm lint

      - name: Run typecheck
        run: pnpm typecheck

      - name: Run readiness scans
        run: pnpm readiness:scan

      - name: Run unit/config smoke tests with coverage + timing
        run: pnpm test:unit:perf

      - name: Upload unit coverage and performance artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: vitest-artifacts
          path: |
            coverage/vitest/**
            test-results/vitest/**

      - name: Run browser smoke tests
        run: pnpm test:browser

      - name: Run production build with timing
        run: pnpm build:ci

      - name: Upload build performance artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-performance-artifacts
          path: test-results/build/**
